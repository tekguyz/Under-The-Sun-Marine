<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Target</title>
</head>
<body>
    <!-- Netlify Hidden Form definition. Bypasses Next.js server routing. -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
        <input type="hidden" name="form-name" value="contact" />
        <input type="text" name="bot-field" />
        <input type="text" name="name" />
        <input type="text" name="phone" />
        <input type="text" name="serviceNeed" />
        <input type="text" name="boatModel" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
