<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded safety background with deep navy to hold contrast and prevent tab background color issues -->
  <rect width="512" height="512" rx="112" fill="#0A1B3F"/>
  
  <!-- Glowing solar core (gerealized gradient) -->
  <circle cx="256" cy="210" r="110" fill="url(#sunGlow)"/>
  
  <!-- Dynamic wave ribbons -->
  <path d="M110 360 C 170 320, 200 380, 256 360 C 312 340, 342 400, 402 360" stroke="#FF7E40" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M120 415 C 180 375, 200 435, 256 415 C 312 395, 342 455, 392 415" stroke="#38BDF8" stroke-width="22" stroke-linecap="round" fill="none"/>
  
  <defs>
    <linearGradient id="sunGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFA857" />
      <stop offset="100%" stop-color="#FF5A1F" />
    </linearGradient>
  </defs>
</svg>
